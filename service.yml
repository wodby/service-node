name: node
type: service
icon: node
title: Node.js
scalable: true
labels:
- node
options:
- version: '24'
  default: true
- version: '22'
  eol: '2027-04-30T00:00:00+00:00'
- version: '20'
  eol: '2026-04-30T00:00:00+00:00'
endpoints:
- name: node
  ports:
  - name: node
    number: 3000
    main: true
    protocol: http

env:
- name: NODE_PORT
  value: '3000'

links:
- name: db
  title: DBMS
  required: false
  env:
  - name: DB_HOST
    value: '{{link.database.host}}'
  - name: DB_PORT
    value: '{{link.database.port}}'
  - name: DB_USERNAME
    value: '{{link.database.user.name}}'
  - name: DB_NAME
    value: '{{link.database.db.name}}'
  - name: DB_DATABASE
    value: '{{link.database.db.name}}'
  - name: DB_PASSWORD
    value: '{{link.database.user.password}}'
    secret: true
  - name: DB_DRIVER
    value: '{{link.database.driver}}'
  - name: DB_CONNECTION
    value: '{{link.database.driver}}'
  selectors:
  - type: db
    labels:
    - mariadb
  - type: db
    labels:
    - mysql
  - type: db
    labels:
    - postgres
- name: sendmail
  title: Mail Transfer Agent
  required: false
  env:
  - name: SMTP_HOST
    value: '{{link.host}}'
  - name: SMTP_PORT
    value: '{{link.port}}'
  selectors:
  - type: service
    labels:
    - smtpd
- name: redis
  title: Redis
  required: false
  env:
  - name: REDIS_PORT
    value: '{{link.port}}'
  - name: REDIS_HOST
    value: '{{link.host}}'
  - name: REDIS_PASSWORD
    value: '{{link.tokens.password}}'
    secret: true
  selectors:
  - type: datastore
    labels:
    - redis
  - type: datastore
    labels:
    - valkey

build:
  dockerfile: Dockerfile
  connect: true
  templates:
  - name: expressjs
    title: Express.js boilerplate
    repo: https://github.com/wodby/expressjs-boilerplate
    branch: main

helm:
  name: wodby
  source: oci://registry-1.docker.io/wodby/node
  chart: oci://registry-1.docker.io/wodby/node
  version: 0.2.0

workloads:
- name: main
  selector:
    matchLabels:
      app.kubernetes.io/instance: '{{service.helm.release}}'
  kind: deployment
  primary: true
  helm:
    labels: podLabels
    annotations: podAnnotations
    volumes: extraVolumes
  containers:
  - name: node
    image: wodby/node
    build: true
    helm:
      resources: resources
      env: envVars
      mounts: extraVolumeMounts
